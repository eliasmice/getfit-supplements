<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GetFit Supplements</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--neon:#39ff14;--neon-dim:#1a7a08;--bg:#080c0a;--bg2:#0e1510;--bg3:#141c16;--card:#111814;--border:#1e2d20;--text:#e8f0e9;--muted:#6b7c6e;--white:#fff;--promo:#ff6b35;}
    *{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
    body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--neon-dim);border-radius:3px;}

    /* ── TOPBAR ── */
    .topbar{background:var(--neon);color:#000;text-align:center;padding:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;position:relative;z-index:201;}

    /* ── HEADER ── */
    header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
    .header-inner{max-width:1400px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:70px;gap:12px;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;cursor:pointer;}
    .logo-img{height:40px;width:auto;object-fit:contain;}
    .logo-fallback{width:40px;height:40px;background:var(--neon);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--white);line-height:1;text-transform:uppercase;}
    .logo-text span{color:var(--neon);}
    .logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
    .header-right{display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end;}
    .search-bar{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;gap:8px;width:100%;max-width:250px;transition:border-color .2s;cursor:text;}
    .search-bar:focus-within{border-color:var(--neon);}
    .search-bar input{background:none;border:none;outline:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;width:100%;cursor:text;}
    .search-bar input::placeholder{color:var(--muted);}
    .cart-btn{position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;transition:all .2s;white-space:nowrap;}
    .cart-btn:hover{border-color:var(--neon);color:var(--neon);}
    .cart-badge{position:absolute;top:-6px;right:-6px;background:var(--neon);color:#000;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;}

    /* ── HERO ── */
    .hero{position:relative;border-bottom:1px solid var(--border);padding:40px 20px;overflow:hidden;min-height:280px;display:flex;align-items:center;isolation:isolate;}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.2;pointer-events:none;}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(8,12,10,.97) 40%,rgba(8,12,10,.55));pointer-events:none;}
    .hero-inner{position:relative;z-index:2;max-width:1400px;margin:0 auto;width:100%;}
    .hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(32px,8vw,68px);line-height:.95;text-transform:uppercase;color:var(--white);}
    .hero h1 .accent{color:var(--neon);display:block;}
    .hero p{margin-top:12px;color:var(--muted);font-size:14px;max-width:480px;line-height:1.5;}
    .hero-badges{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
    .hbadge{display:flex;align-items:center;gap:6px;background:rgba(14,21,16,.85);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--muted);}
    .dot{width:6px;height:6px;background:var(--neon);border-radius:50%;flex-shrink:0;}

    /* ══ VIEWS ══ */
    #viewCatalog{display:block;}
    #viewProduct{display:none;}

    /* ── CATALOG LAYOUT ── */
    .layout{max-width:1400px;margin:0 auto;padding:20px;display:grid;grid-template-columns:260px 1fr;gap:24px;}

    /* ── SIDEBAR ── */
    .sidebar{position:sticky;top:86px;height:fit-content;display:flex;flex-direction:column;gap:16px;}
    .fgroup{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .fgroup-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s;}
    .fgroup-header:hover{background:var(--bg3);}
    .fgroup-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
    .fgroup-arrow{color:var(--muted);font-size:10px;transition:transform .2s;}
    .fgroup.open .fgroup-arrow{transform:rotate(180deg);}
    .fgroup-body{display:none;padding:10px 12px 12px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;}
    .fgroup.open .fgroup-body{display:flex;}

    .pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;}
    .pill:hover{border-color:var(--text);color:var(--text);}
    .pill.active{background:rgba(57,255,20,.1);border-color:rgba(57,255,20,.35);color:var(--neon);}
    .pill.promo-pill.active{background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.4);color:var(--promo);}

    .sub-pill{font-size:11px;padding:4px 10px;}
    .sub-pill::before{content:"↳ ";color:var(--neon-dim);}
    .cat-parent{font-weight:600;width:100%;}
    .subcat-group{display:none;flex-wrap:wrap;gap:5px;width:100%;padding-left:10px;border-left:2px solid rgba(57,255,20,0.25);margin-top:4px;margin-bottom:2px;}
    .subcat-group.open{display:flex;}

    /* MAIN */
    .content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
    .content-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;color:var(--white);}
    .content-count{color:var(--muted);font-size:12px;margin-top:2px;}
    .sort-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-family:'Barlow',sans-serif;font-size:13px;cursor:pointer;outline:none;}

    .active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
    .af-chip{background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.25);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--neon);display:flex;align-items:center;gap:5px;}
    .af-chip button{background:none;border:none;color:var(--neon);cursor:pointer;font-size:14px;line-height:1;padding:0;}
    .clear-all-btn{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--promo);cursor:pointer;transition:all .15s;font-family:'Barlow',sans-serif;white-space:nowrap;}

    /* PRODUCT GRID */
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}

    /* PRODUCT CARD */
    .product-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .25s;position:relative;display:flex;flex-direction:column;}
    .product-card:hover{border-color:rgba(57,255,20,.3);transform:translateY(-3px);box-shadow:0 8px 32px rgba(57,255,20,.07);}

    /* GALLERY ADJUSTMENTS */
    .product-gallery{position:relative;width:100%;aspect-ratio:1;background:#fff;overflow:hidden;}
    .gallery-slides{display:flex;width:100%;height:100%;transition:transform .3s ease;}
    .gallery-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0;}
    .gallery-slide img{width:90%;height:90%;object-fit:contain;}
    
    .gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;}
    .product-card:hover .gallery-arrow{opacity:1;}
    .gallery-arrow:hover{background:var(--neon);color:#000;}
    .gallery-prev{left:8px;}.gallery-next{right:8px;}

    .product-info{padding:12px;flex:1;}
    .product-category{font-size:10px;color:var(--neon);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
    .product-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--white);line-height:1.2;margin-bottom:6px;}
    .product-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:30px;}

    /* ══ PRODUCT PAGE VIEW ══ */
    #viewProduct{max-width:1400px;margin:0 auto;padding:20px;position:relative;z-index:1;}
    .product-page{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start;}
    .pp-main-img{width:100%;aspect-ratio:1;background:#fff;border-radius:16px;overflow:hidden;position:relative;margin-bottom:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}
    .pp-main-img img{width:90%;height:90%;object-fit:contain;cursor:zoom-in;}
    .pp-thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
    .pp-thumbs::-webkit-scrollbar{display:none;}
    .pp-thumb{width:64px;height:64px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;background:#fff;flex-shrink:0;}
    .pp-thumb.active{border-color:var(--neon);}
    .pp-thumb img{width:100%;height:100%;object-fit:contain;}

    /* ── MOBILE OPTIMIZATIONS ── */
    @media(max-width: 1000px){
      .layout{grid-template-columns:1fr; padding:16px;}
      .sidebar{position:static; order:-1;}
      .product-page{grid-template-columns:1fr; gap:24px;}
      .pp-gallery{position:static;}
      .cart-drawer{width:100%;}
      .search-bar{max-width:none; order: -1; margin-bottom: 0;}
      .header-inner{height: auto; padding: 12px 16px; flex-wrap: wrap;}
      .header-right{width: 100%; justify-content: space-between; gap:10px;}
      .logo-text{font-size: 16px;}
      
      /* Habilitar swipe en tarjetas para móvil */
      .gallery-slides {
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
      }
      .gallery-slides::-webkit-scrollbar { display: none; }
      .gallery-slide { scroll-snap-align: start; }
      .gallery-arrow { display: none; } /* Ocultar flechas en móvil para favorecer el swipe */
      
      .product-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .product-name { font-size: 15px; }
      .pp-name { font-size: 28px; }
    }

    /* Resto de estilos (cart, buttons, lightbox, etc) se mantienen igual... */
    .back-btn{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 16px;font-family:'Barlow',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;margin-bottom:20px;text-decoration:none;}
    .pp-info{display:flex;flex-direction:column;gap:16px;}
    .pp-brand{font-size:11px;color:var(--neon);font-weight:600;letter-spacing:2px;text-transform:uppercase;}
    .pp-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;color:var(--white);line-height:1.1;}
    .pp-price-block{padding:16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;}
    .pp-price{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;color:var(--neon);}
    .pp-price-orig{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--muted);text-decoration:line-through;}
    .pp-price-promo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;color:var(--promo);}
    .pp-qty-row{display:flex;align-items:center;gap:12px;margin-top:8px;}
    .pp-qty-ctrl{display:flex;align-items:center;}
    .ppq-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:40px;height:40px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;}
    .ppq-num{background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--white);width:50px;height:40px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;}
    .pp-add-btn{width:100%;background:var(--neon);color:#000;border:none;border-radius:10px;height:52px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;cursor:pointer;}

    /* CART DRAWER */
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:none;backdrop-filter:blur(4px);}
    .cart-overlay.open{display:block;}
    .cart-drawer{position:fixed;right:0;top:0;width:400px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:151;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;}
    .cart-drawer.open{transform:translateX(0);}
    .cart-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .cart-items{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
    .cart-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;padding:12px;}
    .wa-btn{width:100%;background:#25D366;color:#000;border:none;border-radius:10px;padding:16px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

    /* TOAST & LIGHTBOX */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--neon);color:#000;padding:12px 24px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;z-index:600;transition:transform .3s ease;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:95vw;max-height:80vh;object-fit:contain;}
  </style>
</head>
<body>

<div class="topbar">🚀 Entregas en Puntarenas · 📦 Envíos a todo el país · 📲 WhatsApp</div>

<header>
  <div class="header-inner">
    <div class="logo" onclick="goHome()">
      <img class="logo-img" id="logoImg" src="https://drive.google.com/thumbnail?id=1uPfzn_J89fv5a81zDjs2klMpAQ0eH2sD&sz=w200" alt="GetFit" onerror="this.style.display='none';document.getElementById('logoFb').style.display='flex'">
      <div class="logo-fallback" id="logoFb">🦍</div>
      <div>
        <div class="logo-text">Get<span>Fit</span> Supplements</div>
        <div class="logo-sub">Costa Rica</div>
      </div>
    </div>
    <div class="header-right">
      <div class="search-bar">
        <input type="search" id="searchInput" placeholder="Buscar..." autocomplete="off">
      </div>
      <button class="cart-btn" onclick="openCart()">
        🛒 <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </div>
</header>

<!-- Resto del cuerpo HTML igual al original... -->
<div id="viewCatalog">
  <section class="hero">
    <div class="hero-bg" style="background-image:url('https://drive.google.com/thumbnail?id=1ctCaAk8QIsNjeVTdoHVHSX21bJJNO0-U&sz=w1600')"></div>
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <h1>Entrená fuerte.<br><span class="accent">Suplementate mejor.</span></h1>
      <p>Las mejores marcas internacionales en Costa Rica.</p>
    </div>
  </section>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main>
      <div class="content-header">
        <div>
          <div class="content-title" id="mainTitle">Productos</div>
          <div class="content-count" id="mainCount">Cargando...</div>
        </div>
        <select class="sort-select" onchange="sortProducts(this.value)">
          <option value="default">Ordenar por</option>
          <option value="promo">Ofertas</option>
          <option value="price-asc">Precio Bajo</option>
          <option value="price-desc">Precio Alto</option>
        </select>
      </div>
      <div class="active-filters" id="activeFilters"></div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>
</div>

<div id="viewProduct">
  <button class="back-btn" onclick="goHome()">← Catálogo</button>
  <div class="product-page" id="productPage"></div>
</div>

<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <div class="cart-title">Tu Carrito</div>
    <button onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" style="padding:20px; border-top:1px solid var(--border)">
    <div id="cartSummary"></div>
    <button class="wa-btn" onclick="enviarWhatsApp()">📲 Pedir por WhatsApp</button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lbImg" src="">
</div>

<div class="toast" id="toast"></div>
